                { chinese: "都", pinyin: "dōu", meaning: "Все" },
                { chinese: "和", pinyin: "hé", meaning: "И" },
                { chinese: "吗", pinyin: "ma", meaning: "Вопрос" },
                { chinese: "呢", pinyin: "ne", meaning: "А?" }
            ] },
            { name: "Счётные слова и фразы", words: [
                { chinese: "个", pinyin: "gè", meaning: "Счётное слово" },
                { chinese: "块", pinyin: "kuài", meaning: "Юань" },
                { chinese: "本", pinyin: "běn", meaning: "Для книг" },
                { chinese: "岁", pinyin: "suì", meaning: "Лет" },
                { chinese: "点", pinyin: "diǎn", meaning: "Немного" },
                { chinese: "些", pinyin: "xiē", meaning: "Некоторые" },
                { chinese: "请", pinyin: "qǐng", meaning: "Пожалуйста" },
                { chinese: "能", pinyin: "néng", meaning: "Мочь" },
                { chinese: "会", pinyin: "huì", meaning: "Уметь" },
                { chinese: "想", pinyin: "xiǎng", meaning: "Хотеть" }
            ] }
        ];

        // Web Speech API для озвучки
        let currentVolume = 0.7;
        
        function speakChinese(text) {
            if (!window.speechSynthesis) {
                alert("Ваш браузер не поддерживает аудио");
                return;
            }
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = "zh-CN";
            utterance.rate = 0.9;
            utterance.volume = currentVolume;
            window.speechSynthesis.cancel();
            window.speechSynthesis.speak(utterance);
        }

        function speakRussian(text) {
            if (!window.speechSynthesis) {
                alert("Ваш браузер не поддерживает аудио");
                return;
            }
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = "ru-RU";
            utterance.rate = 0.9;
            utterance.volume = currentVolume;
            window.speechSynthesis.cancel();
            window.speechSynthesis.speak(utterance);
        }

        // Регулятор громкости
        const volumeSlider = document.getElementById('volumeSlider');
        volumeSlider.addEventListener('input', (e) => {
            currentVolume = e.target.value / 100;
        });

        // Хранилище прогресса
        let learnedWords = JSON.parse(localStorage.getItem('hsk1_learned_audio')) || [];
        let currentLesson = 0;

        function saveProgress() {
            localStorage.setItem('hsk1_learned_audio', JSON.stringify(learnedWords));
            updateStats();
        }

        function isWordLearned(lessonIndex, wordIndex) {
            return learnedWords.includes(`${lessonIndex}_${wordIndex}`);
        }

        function toggleWord(lessonIndex, wordIndex) {
            const key = `${lessonIndex}_${wordIndex}`;
            const index = learnedWords.indexOf(key);
            if (index === -1) {
                learnedWords.push(key);
            } else {
                learnedWords.splice(index, 1);
            }
            saveProgress();
            renderCurrentLesson();
            updateLessonButtons();
        }

        function getLessonLearnedCount(lessonIndex) {
            let count = 0;
            for (let i = 0; i < lessons[lessonIndex].words.length; i++) {
                if (isWordLearned(lessonIndex, i)) count++;
            }
            return count;
        }

        function updateStats() {
            let total = 0;
            for (let i = 0; i < lessons.length; i++) {
                total += getLessonLearnedCount(i);
            }
            const currentCount = getLessonLearnedCount(currentLesson);
            const percent = Math.round(total / 150 * 100);
            
            document.getElementById('totalLearned').innerText = total;
            document.getElementById('currentLessonLearned').innerText = currentCount;
            document.getElementById('progressPercent').innerText = percent + '%';
        }

        function renderLessonNav() {
            const nav = document.getElementById('lessonNav');
            nav.innerHTML = '';
            for (let i = 0; i < lessons.length; i++) {
                const btn = document.createElement('button');
                btn.className = 'lesson-btn';
                if (i === currentLesson) btn.classList.add('active');
                if (getLessonLearnedCount(i) === 10) btn.classList.add('learned');
                btn.innerText = i + 1;
                btn.onclick = () => {
                    currentLesson = i;
                    renderLessonNav();
                    renderCurrentLesson();
                };
                nav.appendChild(btn);
            }
        }

        function updateLessonButtons() {
            const btns = document.querySelectorAll('.lesson-btn');
            for (let i = 0; i < btns.length; i++) {
                btns[i].classList.remove('learned');
                if (getLessonLearnedCount(i) === 10) btns[i].classList.add('learned');
                if (i === currentLesson) btns[i].classList.add('active');
                else btns[i].classList.remove('active');
            }
        }

        function renderCurrentLesson() {
            const lesson = lessons[currentLesson];
            const content = document.getElementById('content');
            
            let wordsHtml = '';
            lesson.words.forEach((word, idx) => {
                const isLearned = isWordLearned(currentLesson, idx);
                wordsHtml += `
                    <div class="word-card">
                        <div class="chinese-area" onclick="speakChinese('${word.chinese}')">
                            <span class="chinese">${word.chinese}</span>
                            <span class="audio-icon">🔊</span>
                        </div>
                        <div class="pinyin">${word.pinyin}</div>
                        <div class="meaning-area" onclick="speakRussian('${word.meaning}')">
                            <span class="meaning">📖 ${word.meaning}</span>
                            <span class="meaning-audio-icon">🔊</span>
                        </div>
                        <button class="check-btn ${isLearned ? 'checked' : ''}" onclick="event.stopPropagation(); toggleWord(${currentLesson}, ${idx})">
                            ${isLearned ? '✓' : '○'}
                        </button>
                    </div>
                `;
            });
            
            const learnedCount = getLessonLearnedCount(currentLesson);
            const percent = Math.round(learnedCount / 10 * 100);
            
            content.innerHTML = `
                <div class="lesson-title">📖 Урок ${currentLesson + 1}: ${lesson.name}</div>
                <div class="lesson-desc">🔊 Нажми на <strong>иероглиф</strong> — услышишь китайское произношение. Нажми на <strong>перевод</strong> — услышишь русский перевод.</div>
                <div class="words-grid">
                    ${wordsHtml}
                </div>
                <div class="lesson-progress">
                    <div class="progress-bar-container">
                        <div class="progress-bar">
                            <div class="progress-fill" style="width: ${percent}%">${percent}%</div>
                        </div>
                    </div>
                    <button class="test-btn" onclick="startTest()">📝 Пройти тест урока</button>
                </div>
            `;
            updateStats();
        }

        // Тест с аудио в вопросах
        let currentTestQuestions = [];
        let currentTestIndex = 0;
        let testScore = 0;

        function startTest() {
            const lesson = lessons[currentLesson];
            currentTestQuestions = [...lesson.words];
            currentTestQuestions = currentTestQuestions.sort(() => 0.5 - Math.random()).slice(0, 5);
            currentTestIndex = 0;
            testScore = 0;
            renderTestQuestion();
            document.getElementById('testModal').classList.add('active');
        }

        function renderTestQuestion() {
            if (currentTestIndex >= currentTestQuestions.length) {
                const percent = Math.round(testScore / currentTestQuestions.length * 100);
                document.getElementById('testContent').innerHTML = `
                    <div class="test-result">
                        🎉 Результат: ${testScore}/${currentTestQuestions.length}<br>
                        ${percent >= 80 ? 'Отлично! Ты готов к следующему уроку!' : 'Повтори слова и попробуй ещё раз!'}
                    </div>
                    <button class="close-modal" onclick="closeTest()">Закрыть</button>
                `;
                return;
            }
            
            const question = currentTestQuestions[currentTestIndex];
            const allMeanings = lessons[currentLesson].words.map(w => w.meaning);
            const options = [question.meaning];
            while (options.length < 4) {
                const random = allMeanings[Math.floor(Math.random() * allMeanings.length)];
                if (!options.includes(random)) options.push(random);
            }
            options.sort(() => 0.5 - Math.random());
            
            let optionsHtml = '';
            options.forEach(opt => {
                optionsHtml += `<div class="test-option" onclick="checkTestAnswer('${opt.replace(/'/g, "\\'")}', this)">${opt}</div>`;
            });
            
            document.getElementById('testContent').innerHTML = `
                <div class="test-question" onclick="speakChinese('${question.chinese}')">
                    ${question.chinese} 🔊
                </div>
                <div style="color: #e74c3c; margin-bottom: 10px;">${question.pinyin}</div>
                <div class="test-options" id="testOptions">
                    ${optionsHtml}
                </div>
                <div>Вопрос ${currentTestIndex + 1}/${currentTestQuestions.length}</div>
                <div style="margin-top: 10px; font-size: 0.8em; opacity: 0.7;">🔊 Нажми на иероглиф, чтобы услышать произношение</div>
            `;
        }
        
        function checkTestAnswer(selected, element) {
            const correct = currentTestQuestions[currentTestIndex].meaning;
            const allOptions = document.querySelectorAll('.test-option');
            allOptions.forEach(opt => {
                opt.style.pointerEvents = 'none';
                if (opt.innerText === correct) opt.classList.add('correct');
                if (opt === element && opt.innerText !== correct) opt.classList.add('wrong');
            });
            
            if (selected === correct) testScore++;
            
            setTimeout(() => {
                currentTestIndex++;
                renderTestQuestion();
            }, 1000);
        }
        
        function closeTest() {
            document.getElementById('testModal').classList.remove('active');
        }
        
        renderLessonNav();
        renderCurrentLesson();
    </script>
</body>
</html>
