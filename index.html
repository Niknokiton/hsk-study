<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎋 Изучай HSK 1-3 | Китайский с удовольствием</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Poppins', 'Comic Neue', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Главная карточка */
        .main-card {
            background: white;
            border-radius: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Шапка */
        .header {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.2em;
            opacity: 0.95;
        }

        /* Выбор уровня */
        .level-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            padding: 20px;
            background: #f8f9fa;
            flex-wrap: wrap;
        }

        .level-btn {
            padding: 12px 30px;
            font-size: 1.2em;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #e9ecef;
            color: #495057;
        }

        .level-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .level-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        /* Меню */
        .menu {
            display: flex;
            gap: 15px;
            padding: 20px;
            background: white;
            justify-content: center;
            flex-wrap: wrap;
            border-bottom: 2px solid #f0f0f0;
        }

        .menu-btn {
            padding: 12px 25px;
            font-size: 1em;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #f8f9fa;
            color: #495057;
            font-weight: bold;
        }

        .menu-btn:hover {
            background: #e9ecef;
            transform: translateY(-2px);
        }

        /* Основной контент */
        .content {
            padding: 30px;
            min-height: 500px;
        }

        /* Карточка слова */
        .word-card {
            background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
            border-radius: 30px;
            padding: 50px;
            text-align: center;
            margin: 20px 0;
            cursor: pointer;
            transition: all 0.3s ease;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        .word-card:hover {
            transform: scale(1.02);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .chinese-word {
            font-size: 4em;
            font-weight: bold;
            color: white;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .pinyin {
            font-size: 1.8em;
            color: rgba(255,255,255,0.95);
            margin-bottom: 10px;
        }

        .meaning {
            font-size: 1.5em;
            color: white;
            font-weight: bold;
            margin-top: 20px;
            display: none;
        }

        .word-card.revealed .meaning {
            display: block;
            animation: fadeInUp 0.3s ease;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Тест */
        .question {
            background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
            border-radius: 30px;
            padding: 40px;
            text-align: center;
            margin-bottom: 30px;
        }

        .question-word {
            font-size: 3em;
            font-weight: bold;
            color: #333;
        }

        .options {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            margin-top: 30px;
        }

        .option {
            background: white;
            padding: 15px;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
            font-weight: bold;
            border: 2px solid #e0e0e0;
        }

        .option:hover {
            transform: translateY(-3px);
            border-color: #667eea;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .option.correct {
            background: #4caf50;
            color: white;
            border-color: #4caf50;
        }

        .option.wrong {
            background: #f44336;
            color: white;
            border-color: #f44336;
        }

        /* Прогресс-бар */
        .progress-section {
            margin: 20px 0;
        }

        .progress-bar {
            background: #e0e0e0;
            border-radius: 20px;
            height: 30px;
            overflow: hidden;
            margin: 10px 0;
        }

        .progress-fill {
            background: linear-gradient(90deg, #4caf50, #8bc34a);
            height: 100%;
            border-radius: 20px;
            transition: width 0.5s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
        }

        /* Результаты теста */
        .result {
            text-align: center;
            padding: 30px;
            background: #e8f5e9;
            border-radius: 20px;
            margin-top: 20px;
        }

        .score {
            font-size: 3em;
            font-weight: bold;
            color: #4caf50;
        }

        /* Анимации */
        .bounce {
            animation: bounce 0.5s ease;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* Кнопки */
        .next-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 50px;
            font-size: 1.2em;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.3s ease;
        }

        .next-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        /* Статистика */
        .stats {
            display: flex;
            justify-content: space-around;
            margin-top: 20px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 20px;
        }

        .stat {
            text-align: center;
        }

        .stat-number {
            font-size: 2em;
            font-weight: bold;
            color: #667eea;
        }

        /* Адаптивность */
        @media (max-width: 768px) {
            .chinese-word { font-size: 2.5em; }
            .question-word { font-size: 2em; }
            .menu-btn { padding: 8px 15px; font-size: 0.9em; }
            .level-btn { padding: 8px 20px; font-size: 1em; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="main-card">
            <div class="header">
                <h1>🎋 Изучай китайский с радостью!</h1>
                <p>HSK 1-3 | Карточки | Тесты | Игры</p>
            </div>

            <div class="level-buttons" id="levelButtons">
                <button class="level-btn active" data-level="1">🌟 HSK 1</button>
                <button class="level-btn" data-level="2">⭐ HSK 2</button>
                <button class="level-btn" data-level="3">✨ HSK 3</button>
            </div>

            <div class="menu">
                <button class="menu-btn" onclick="showFlashcards()">📖 Карточки</button>
                <button class="menu-btn" onclick="startTest()">📝 Тест</button>
                <button class="menu-btn" onclick="showProgress()">📊 Прогресс</button>
            </div>

            <div class="content" id="content">
                <!-- Сюда будет загружаться контент -->
            </div>
        </div>
    </div>

    <script>
        // Словарь HSK 1-3
        const wordsDB = {
            1: [
                { word: "你好", pinyin: "nǐ hǎo", meaning: "Здравствуйте" },
                { word: "妈妈", pinyin: "mā ma", meaning: "Мама" },
                { word: "爸爸", pinyin: "bà ba", meaning: "Папа" },
                { word: "水", pinyin: "shuǐ", meaning: "Вода" },
                { word: "吃", pinyin: "chī", meaning: "Есть" },
                { word: "谢谢", pinyin: "xiè xie", meaning: "Спасибо" },
                { word: "不", pinyin: "bù", meaning: "Нет" },
                { word: "是", pinyin: "shì", meaning: "Быть" },
                { word: "大", pinyin: "dà", meaning: "Большой" },
                { word: "小", pinyin: "xiǎo", meaning: "Маленький" }
            ],
            2: [
                { word: "快乐", pinyin: "kuài lè", meaning: "Счастливый" },
                { word: "唱歌", pinyin: "chàng gē", meaning: "Петь" },
                { word: "跑步", pinyin: "pǎo bù", meaning: "Бегать" },
                { word: "红色", pinyin: "hóng sè", meaning: "Красный" },
                { word: "医生", pinyin: "yī shēng", meaning: "Врач" },
                { word: "饭店", pinyin: "fàn diàn", meaning: "Ресторан" },
                { word: "学习", pinyin: "xué xí", meaning: "Учиться" },
                { word: "朋友", pinyin: "péng you", meaning: "Друг" }
            ],
            3: [
                { word: "虽然", pinyin: "suī rán", meaning: "Хотя" },
                { word: "习惯", pinyin: "xí guàn", meaning: "Привычка" },
                { word: "重要", pinyin: "zhòng yào", meaning: "Важный" },
                { word: "地铁", pinyin: "dì tiě", meaning: "Метро" },
                { word: "机场", pinyin: "jī chǎng", meaning: "Аэропорт" },
                { word: "服务员", pinyin: "fú wù yuán", meaning: "Официант" }
            ]
        };

        let currentLevel = 1;
        let currentCardIndex = 0;
        let testQuestions = [];
        let currentQuestion = 0;
        let testScore = 0;
        let testActive = false;
        let flashcardsActive = false;

        // Прогресс (сохраняется в браузере)
        let progress = JSON.parse(localStorage.getItem('hsk_progress')) || { learned: [], stats: { 1: 0, 2: 0, 3: 0 } };

        function saveProgress() {
            localStorage.setItem('hsk_progress', JSON.stringify(progress));
        }

        function updateStats() {
            const levelWords = wordsDB[currentLevel];
            const learnedCount = progress.stats[currentLevel] || 0;
            return { total: levelWords.length, learned: learnedCount };
        }

        function showFlashcards() {
            flashcardsActive = true;
            testActive = false;
            currentCardIndex = 0;
            renderFlashcard();
        }

        function renderFlashcard() {
            const words = wordsDB[currentLevel];
            if (currentCardIndex >= words.length) {
                document.getElementById('content').innerHTML = `
                    <div class="result">
                        <div class="score">🎉</div>
                        <h2>Поздравляю! Ты повторил все слова!</h2>
                        <button class="next-btn" onclick="showFlashcards()">🔄 Начать заново</button>
                    </div>
                `;
                return;
            }

            const word = words[currentCardIndex];
            const html = `
                <div class="word-card" onclick="revealMeaning(this)">
                    <div class="chinese-word">${word.word}</div>
                    <div class="pinyin">${word.pinyin}</div>
                    <div class="meaning">✨ ${word.meaning} ✨</div>
                </div>
                <div style="display: flex; gap: 15px; justify-content: center; margin-top: 20px;">
                    <button class="next-btn" onclick="prevCard()">◀ Назад</button>
                    <button class="next-btn" onclick="markAsLearned()">✅ Выучил</button>
                    <button class="next-btn" onclick="nextCard()">Далее ▶</button>
                </div>
                <div class="stats">
                    <div class="stat">
                        <div class="stat-number">${currentCardIndex + 1}/${wordsDB[currentLevel].length}</div>
                        <div>Слово</div>
                    </div>
                    <div class="stat">
                        <div class="stat-number">${progress.stats[currentLevel] || 0}</div>
                        <div>Выучено</div>
                    </div>
                </div>
            `;
            document.getElementById('content').innerHTML = html;
        }

        function revealMeaning(card) {
            card.classList.toggle('revealed');
        }

        function nextCard() {
            currentCardIndex++;
            renderFlashcard();
        }

        function prevCard() {
            if (currentCardIndex > 0) {
                currentCardIndex--;
                renderFlashcard();
            }
        }

        function markAsLearned() {
            const word = wordsDB[currentLevel][currentCardIndex];
            if (!progress.learned.includes(word.word)) {
                progress.learned.push(word.word);
                progress.stats[currentLevel] = (progress.stats[currentLevel] || 0) + 1;
                saveProgress();
                showNotification('🎉 Отлично! Слово добавлено в выученные!');
            }
            nextCard();
        }

        function startTest() {
            const words = wordsDB[currentLevel];
            testQuestions = [...words];
            testQuestions = testQuestions.sort(() => 0.5 - Math.random()).slice(0, 8);
            currentQuestion = 0;
            testScore = 0;
            testActive = true;
            flashcardsActive = false;
            renderTest();
        }

        function renderTest() {
            if (currentQuestion >= testQuestions.length) {
                const percent = (testScore / testQuestions.length * 100).toFixed(1);
                document.getElementById('content').innerHTML = `
                    <div class="result">
                        <div class="score">${testScore}/${testQuestions.length}</div>
                        <h2>${percent >= 70 ? '🎉 Молодец! 🎉' : '📚 Продолжай учиться!'}</h2>
                        <p>Твой результат: ${percent}%</p>
                        <button class="next-btn" onclick="startTest()">🔄 Пройти тест снова</button>
                        <button class="next-btn" onclick="showFlashcards()">📖 Учить слова</button>
                    </div>
                `;
                return;
            }

            const question = testQuestions[currentQuestion];
            const allMeanings = wordsDB[currentLevel].map(w => w.meaning);
            const options = [question.meaning];
            while (options.length < 4) {
                const randomMeaning = allMeanings[Math.floor(Math.random() * allMeanings.length)];
                if (!options.includes(randomMeaning)) {
                    options.push(randomMeaning);
                }
            }
            options.sort(() => 0.5 - Math.random());

            let optionsHtml = '';
            options.forEach(opt => {
                optionsHtml += `<div class="option" onclick="checkAnswer('${opt.replace(/'/g, "\\'")}', this)">${opt}</div>`;
            });

            const html = `
                <div class="question">
                    <div class="question-word">${question.word}</div>
                    <div class="pinyin" style="font-size: 1.5em; margin-top: 10px;">${question.pinyin}</div>
                </div>
                <div class="options" id="options">
                    ${optionsHtml}
                </div>
                <div style="text-align: center; margin-top: 20px;">
                    Вопрос ${currentQuestion + 1}/${testQuestions.length}
                </div>
            `;
            document.getElementById('content').innerHTML = html;
        }

        function checkAnswer(selected, element) {
            const correct = testQuestions[currentQuestion].meaning;
            const allOptions = document.querySelectorAll('.option');
            
            allOptions.forEach(opt => {
                opt.style.pointerEvents = 'none';
                if (opt.innerText === correct) {
                    opt.classList.add('correct');
                }
                if (opt === element && opt.innerText !== correct) {
                    opt.classList.add('wrong');
                }
            });

            if (selected === correct) {
                testScore++;
                element.classList.add('correct');
                showNotification('✅ Правильно! +1 балл', 'success');
            } else {
                showNotification(`❌ Неправильно! Правильно: ${correct}`, 'error');
            }

            setTimeout(() => {
                currentQuestion++;
                renderTest();
            }, 1500);
        }

        function showProgress() {
            flashcardsActive = false;
            testActive = false;
            const stats = updateStats();
            const percent = stats.total > 0 ? (stats.learned / stats.total * 100).toFixed(1) : 0;
            
            const html = `
                <div class="progress-section">
                    <h2>📊 Твой прогресс - HSK ${currentLevel}</h2>
                    <div class="progress-bar">
                        <div class="progress-fill" style="width: ${percent}%">
                            ${percent}%
                        </div>
                    </div>
                    <div class="stats">
                        <div class="stat">
                            <div class="stat-number">${stats.learned}</div>
                            <div>Выучено слов</div>
                        </div>
                        <div class="stat">
                            <div class="stat-number">${stats.total}</div>
                            <div>Всего слов</div>
                        </div>
                        <div class="stat">
                            <div class="stat-number">${Math.round(percent)}%</div>
                            <div>Прогресс</div>
                        </div>
                    </div>
                    <div style="text-align: center; margin-top: 20px;">
                        <button class="next-btn" onclick="showFlashcards()">📖 Продолжить учить</button>
                        <button class="next-btn" onclick="startTest()">📝 Пройти тест</button>
                    </div>
                </div>
            `;
            document.getElementById('content').innerHTML = html;
        }

        function showNotification(message, type = 'info') {
            const notification = document.createElement('div');
            notification.textContent = message;
            notification.style.cssText = `
                position: fixed;
                bottom: 20px;
                right: 20px;
                background: ${type === 'success' ? '#4caf50' : '#ff9800'};
                color: white;
                padding: 15px 25px;
                border-radius: 50px;
                z-index: 1000;
                animation: slideIn 0.3s ease;
                box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            `;
            document.body.appendChild(notification);
            setTimeout(() => notification.remove(), 2000);
        }

        // Выбор уровня
        document.querySelectorAll('.level-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.level-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentLevel = parseInt(btn.dataset.level);
                if (flashcardsActive) showFlashcards();
                else if (testActive) startTest();
                else showProgress();
            });
        });

        // Показываем приветствие при загрузке
        showFlashcards();
    </script>
</body>
</html>
